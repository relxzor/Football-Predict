<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpanzer Predict • Premium Football Picks</title>

    <style>
        :root {
            --gold: #d4a843;
            --gold-light: #e8c96a;
            --gold-dark: #9e7a2e;
            --gold-glow: rgba(212, 168, 67, 0.5);
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --text-dim: #999;
            --text-muted: #777;
            --card-bg: #111111;
            --card-border: rgba(212, 168, 67, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(212, 168, 67, 0.04) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 100%, rgba(212, 168, 67, 0.03) 0%, transparent 70%);
            color: var(--text);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        /* HEADER */
        .header {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 420px;
            min-height: 260px;
            overflow: hidden;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.7), 0 0 80px rgba(212, 168, 67, 0.08);
        }

        .header-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.45) saturate(0.9);
        }

        .header-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 0.25) 0%,
                    rgba(0, 0, 0, 0.05) 30%,
                    rgba(0, 0, 0, 0.6) 70%,
                    rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
        }

        .header-overlay::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.7;
        }

        .header-text {
            position: absolute;
            bottom: 24px;
            left: 24px;
            right: 24px;
            z-index: 3;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        }

        .header-text h1 {
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--gold-light);
            text-transform: uppercase;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .header-text .subtitle {
            font-size: clamp(11px, 2vw, 14px);
            color: #ccc;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        .header-accent-line {
            position: absolute;
            bottom: -1px;
            left: 24px;
            width: 60px;
            height: 3px;
            background: var(--gold);
            border-radius: 0 0 3px 3px;
            z-index: 4;
            box-shadow: 0 0 12px var(--gold-glow);
        }

        /* CONTAINER */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px 10px;
        }

        /* SECTION LABEL */
        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .section-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 10px var(--gold-glow);
            flex-shrink: 0;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 6px var(--gold-glow);
            }
            50% {
                box-shadow: 0 0 18px rgba(212, 168, 67, 0.9);
            }
        }

        .section-label span {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--gold);
            font-weight: 600;
        }

        .section-label .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(212, 168, 67, 0.4), transparent);
            border-radius: 1px;
        }

        .section-label.top-match .dot {
            background: #f0c45a;
            box-shadow: 0 0 16px rgba(240, 196, 90, 0.7);
            width: 10px;
            height: 10px;
        }

        .section-label.top-match span {
            color: #f0d87c;
            letter-spacing: 3px;
            font-size: 12px;
        }

        /* CARD */
        .card {
            background: linear-gradient(160deg, #141414 0%, #0f0f0f 40%, #111 100%);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.015);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(212, 168, 67, 0.03) 0%, transparent 50%);
            pointer-events: none;
            transition: opacity 0.35s ease;
            opacity: 0;
        }

        .card:hover {
            border-color: rgba(212, 168, 67, 0.5);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.7), 0 0 40px rgba(212, 168, 67, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.025);
            transform: translateY(-2px);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:active {
            transform: scale(0.985);
            transition: transform 0.15s ease;
        }

        .league {
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .league::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(212, 168, 67, 0.2);
            border-radius: 1px;
        }

        .match {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            position: relative;
            z-index: 1;
            min-height: 44px;
        }

        .team {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .team.home {
            justify-content: flex-start;
        }

        .team.away {
            justify-content: flex-end;
            text-align: right;
        }

        .flag-circle {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1.5px solid rgba(212, 168, 67, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            line-height: 1;
        }

        .card:hover .flag-circle {
            border-color: rgba(212, 168, 67, 0.8);
            box-shadow: 0 0 16px rgba(212, 168, 67, 0.2), 0 0 0 2px rgba(212, 168, 67, 0.08);
        }

        .team span {
            font-size: 13px;
            font-weight: 500;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
            letter-spacing: 0.2px;
            transition: color 0.3s ease;
        }

        .card:hover .team span {
            color: #fff;
        }

        .time-badge {
            flex-shrink: 0;
            text-align: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            min-width: 54px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ddd;
            transition: all 0.3s ease;
        }

        .card:hover .time-badge {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(212, 168, 67, 0.3);
            color: #fff;
            box-shadow: 0 0 12px rgba(212, 168, 67, 0.08);
        }

        /* PICK BADGE */
        .pick {
            margin-top: 12px;
            padding: 9px 14px;
            background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
            border: 1px solid rgba(212, 168, 67, 0.4);
            color: var(--gold-light);
            font-weight: 700;
            text-align: center;
            border-radius: 22px;
            font-size: 12.5px;
            letter-spacing: 1.2px;
            position: relative;
            z-index: 1;
            transition: all 0.35s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .card:hover .pick {
            background: linear-gradient(135deg, #1c1c1c 0%, #141414 100%);
            border-color: rgba(212, 168, 67, 0.7);
            box-shadow: 0 0 22px rgba(212, 168, 67, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            color: #f0d87c;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px 16px 28px;
            font-size: 11px;
            color: #555;
            letter-spacing: 1px;
        }

        .footer::before {
            content: '';
            display: block;
            width: 40px;
            height: 1px;
            background: rgba(212, 168, 67, 0.3);
            margin: 0 auto 14px;
            border-radius: 1px;
        }

        .footer .brand {
            color: var(--gold);
            font-weight: 600;
            opacity: 0.8;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .header {
                min-height: 200px;
                max-height: 280px;
            }
            .header-text {
                bottom: 16px;
                left: 14px;
                right: 14px;
            }
            .header-text h1 {
                font-size: 20px;
                letter-spacing: 2px;
            }
            .container {
                padding: 14px 10px 8px;
            }
            .card {
                padding: 13px 12px;
                border-radius: 12px;
            }
            .flag-circle {
                width: 28px;
                height: 28px;
                font-size: 18px;
            }
            .team span {
                font-size: 11px;
                max-width: 75px;
            }
            .time-badge {
                font-size: 12px;
                padding: 5px 10px;
            }
            .pick {
                font-size: 11px;
                padding: 7px 10px;
                border-radius: 18px;
            }
            .league {
                font-size: 9.5px;
                letter-spacing: 1.5px;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 10px;
        }
        ::selection {
            background: rgba(212, 168, 67, 0.3);
            color: #fff;
        }
    </style>
</head>

<body>

    <header class="header">
        <img src="Poster.png" alt="Arpanzer Predict Header Poster" class="header-poster"
        onerror="this.style.display='none'; this.parentElement.style.background='linear-gradient(160deg, #1a1a1a 0%, #0d0d0d 50%, #111 100%)';">
        <div class="header-overlay"></div>
        <div class="header-text">
            <h1>Predict. Win.</h1>
            <p class="subtitle">Be the champion with Arpanzer system picks</p>
        </div>
        <div class="header-accent-line"></div>
    </header>

    <main class="container">

        <!-- ⭐ TOP MATCH SECTION -->
        <div class="section-label top-match">
            <div class="dot"></div>
            <span>⭐ Top Match</span>
            <div class="line"></div>
        </div>

        <!-- Brazil vs Norway -->
        <article class="card">
            <div class="league">🌍 World Cup 2026</div>
            <div class="match">
                <div class="team home">
                    <div class="flag-circle">🇧🇷</div>
                    <span>Brazil</span>
                </div>
                <div class="time-badge">04:00</div>
                <div class="team away">
                    <span>Norway</span>
                    <div class="flag-circle">🇳🇴</div>
                </div>
            </div>
            <div class="pick">
                Pick : Over 1.5
            </div>
        </article>

        <!-- Mexico vs England -->
        <article class="card">
            <div class="league">🌍 World Cup 2026</div>
            <div class="match">
                <div class="team home">
                    <div class="flag-circle">🇲🇽</div>
                    <span>Mexico</span>
                </div>
                <div class="time-badge">08:00</div>
                <div class="team away">
                    <span>England</span>
                    <div class="flag-circle">🇬🇧</div>
                </div>
            </div>
            <div class="pick">
                Pick : BTTS YES
            </div>
        </article>

    </main>

    <footer class="footer">
        <span class="brand">© 2026 Arpanzer Predict System</span> &nbsp;•&nbsp; Premium Football Picks
    </footer>

</body>
</html>
